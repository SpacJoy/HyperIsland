name: Build & Release

# 触发条件
on:
  # 当代码推送到 main 分支时触发
  push:
    branches: [main]
  # 手动触发：在 GitHub Actions 页面可以手动运行此工作流
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 第一步：检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 第二步：检测版本号是否变更
      - name: Detect version change
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          PREVIOUS=$(git show HEAD~1:pubspec.yaml 2>/dev/null | grep '^version:' | awk '{print $2}' || echo "")

          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT" | cut -d'+' -f2)
          PREVIOUS_VERSION_NAME=$(echo "$PREVIOUS" | cut -d'+' -f1)

          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$CURRENT" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "build_version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
            echo "build_version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
            echo "::notice::Version changed: $PREVIOUS → $CURRENT, will release."
          else
            NEW_VERSION_CODE=$((VERSION_CODE + 1))
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "build_version_name=$VERSION_NAME-dev" >> $GITHUB_OUTPUT
            echo "build_version_code=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
            echo "::notice::No version change ($CURRENT), build only with dev suffix."
          fi

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE"  >> $GITHUB_OUTPUT
          echo "previous_version=$PREVIOUS_VERSION_NAME" >> $GITHUB_OUTPUT

      # 第三步：安装 Java 环境
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 第四步：安装 Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 第五步：缓存 Pub 依赖和 Flutter 中间构建产物
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool
            build/app/intermediates
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # 第六步：缓存 Gradle 依赖和构建缓存
      # 配合 gradle.properties 中的 org.gradle.caching=true 生效
      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # 第七步：安装 Flutter 依赖
      - name: Install dependencies
        run: flutter pub get

      # 第八步：解码签名密钥
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks

      # 第九步：编译 APK（仅 ARM64）
      - name: Build APK
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --build-name="${{ steps.version.outputs.build_version_name }}" \
            --build-number="${{ steps.version.outputs.build_version_code }}"

      # ────────────────────────────────────────────────────────────────────────

      # 第十步：重命名 APK 文件
      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "HyperIsland-v${{ steps.version.outputs.build_version_name }}.apk"

      # 第十一步：提取更新日志（仅版本变更时）
      - name: Extract changelog
        if: steps.version.outputs.changed == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          PREVIOUS_VERSION="${{ steps.version.outputs.previous_version }}"

          if grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            awk "/^## \[$VERSION\]/,/^## \[/ {print}" CHANGELOG.md | sed '$d' > changelog_content.txt
          else
            echo "## HyperIsland v$VERSION" > changelog_content.txt
            echo "" >> changelog_content.txt
            echo "### 变更日志" >> changelog_content.txt
            echo "" >> changelog_content.txt

            if [ -n "$PREVIOUS_VERSION" ] && git rev-parse "v$PREVIOUS_VERSION" >/dev/null 2>&1; then
              git log "v$PREVIOUS_VERSION"..HEAD --pretty=format:"- %s" >> changelog_content.txt
            else
              git log --pretty=format:"- %s" -20 >> changelog_content.txt
            fi
          fi

          CHANGELOG=$(cat changelog_content.txt)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 第十二步：创建正式 Release（仅版本变更时）
      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: HyperIsland v${{ steps.version.outputs.version_name }}
          body: ${{ steps.changelog.outputs.content }}
          files: HyperIsland-v${{ steps.version.outputs.version_name }}.apk
          draft: false
          prerelease: false

      # 第十三步：创建开发版预发布（版本未变更时）
      # 使用 run_number 作为唯一 tag，Releases 页可直接下载 APK
      - name: Create dev pre-release
        if: steps.version.outputs.changed == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Dev Build v${{ steps.version.outputs.build_version_name }} (#${{ github.run_number }})
          body: |
            自动开发版构建，仅供测试使用。

            提交：${{ github.sha }}
          files: HyperIsland-v${{ steps.version.outputs.build_version_name }}.apk
          draft: false
          prerelease: true
          make_latest: false
